name: yunxia-backend

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yunxia-backend
    restart: unless-stopped
    ports:
      - "${YUNXIA_HTTP_PORT:-8080}:8080"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      YUNXIA_SERVER_HOST: "0.0.0.0"
      YUNXIA_SERVER_PORT: "8080"
      YUNXIA_SERVER_MODE: "${YUNXIA_SERVER_MODE:-release}"
      YUNXIA_DATABASE_DSN: "/app/data/database.db"
      YUNXIA_STORAGE_DATA_DIR: "/app/data/storage"
      YUNXIA_STORAGE_TEMP_DIR: "/app/data/temp"
      YUNXIA_JWT_SECRET: "${YUNXIA_JWT_SECRET:-change-me-in-production}"
      YUNXIA_ARIA2_RPC_URL: "http://aria2:6800/jsonrpc"
      YUNXIA_ARIA2_RPC_SECRET: "${ARIA2_RPC_SECRET:-}"
    volumes:
      - backend-data:/app/data
      - backend-downloads:/downloads
    depends_on:
      - aria2
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  aria2:
    build:
      context: ./backend
      dockerfile: docker/aria2.Dockerfile
    container_name: yunxia-aria2
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      ARIA2_RPC_SECRET: "${ARIA2_RPC_SECRET:-}"
      ARIA2_RPC_PORT: "6800"
      ARIA2_LISTEN_PORT: "${ARIA2_LISTEN_PORT:-6888}"
      ARIA2_DOWNLOAD_DIR: "/downloads"
      ARIA2_CONF_DIR: "/config"
      ARIA2_MAX_CONCURRENT_DOWNLOADS: "${ARIA2_MAX_CONCURRENT_DOWNLOADS:-5}"
    volumes:
      - aria2-config:/config
      - backend-downloads:/downloads
    ports:
      - "${ARIA2_RPC_PORT:-6800}:6800"
      - "${ARIA2_LISTEN_PORT:-6888}:6888"
      - "${ARIA2_LISTEN_PORT:-6888}:6888/udp"

volumes:
  backend-data:
  backend-downloads:
  aria2-config:
