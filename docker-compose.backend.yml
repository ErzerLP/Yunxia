name: yunxia-backend

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Linux 测试机常用 127.0.0.1 代理；build 期使用 host 网络可让容器内 apt/go 访问宿主机代理。
      # 如目标环境不允许 host build network，可在 .env 中覆盖为 default。
      network: "${YUNXIA_DOCKER_BUILD_NETWORK:-host}"
      args:
        GO_IMAGE: "${YUNXIA_DOCKER_GO_IMAGE:-golang:1.25-bookworm}"
        RUNTIME_IMAGE: "${YUNXIA_DOCKER_RUNTIME_IMAGE:-debian:bookworm-slim}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        NO_PROXY: "${NO_PROXY:-}"
        no_proxy: "${no_proxy:-}"
    container_name: yunxia-backend
    restart: unless-stopped
    ports:
      - "${YUNXIA_HTTP_PORT:-8080}:8080"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      YUNXIA_SERVER_HOST: "0.0.0.0"
      YUNXIA_SERVER_PORT: "8080"
      YUNXIA_SERVER_MODE: "${YUNXIA_SERVER_MODE:-release}"
      YUNXIA_DATABASE_DSN: "/app/data/database.db"
      YUNXIA_STORAGE_DATA_DIR: "/app/data/storage"
      YUNXIA_STORAGE_TEMP_DIR: "/app/data/temp"
      YUNXIA_JWT_SECRET: "${YUNXIA_JWT_SECRET:-change-me-in-production}"
      YUNXIA_ARIA2_RPC_URL: "http://aria2:6800/jsonrpc"
      YUNXIA_ARIA2_RPC_SECRET: "${ARIA2_RPC_SECRET:-}"
    volumes:
      - backend-data:/app/data
      - backend-downloads:/downloads
    depends_on:
      - aria2
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  aria2:
    build:
      context: ./backend
      dockerfile: docker/aria2.Dockerfile
      # 与 backend 构建保持一致，避免 apk 访问宿主机 127.0.0.1 代理时失败。
      network: "${YUNXIA_DOCKER_BUILD_NETWORK:-host}"
      args:
        ARIA2_BASE_IMAGE: "${YUNXIA_DOCKER_ARIA2_BASE_IMAGE:-alpine:3.22}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        NO_PROXY: "${NO_PROXY:-}"
        no_proxy: "${no_proxy:-}"
    container_name: yunxia-aria2
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      ARIA2_RPC_SECRET: "${ARIA2_RPC_SECRET:-}"
      ARIA2_RPC_PORT: "6800"
      ARIA2_LISTEN_PORT: "${ARIA2_LISTEN_PORT:-6888}"
      ARIA2_DOWNLOAD_DIR: "/downloads"
      ARIA2_CONF_DIR: "/config"
      ARIA2_MAX_CONCURRENT_DOWNLOADS: "${ARIA2_MAX_CONCURRENT_DOWNLOADS:-5}"
    volumes:
      - aria2-config:/config
      - backend-downloads:/downloads
    ports:
      - "${ARIA2_RPC_PORT:-6800}:6800"
      - "${ARIA2_LISTEN_PORT:-6888}:6888"
      - "${ARIA2_LISTEN_PORT:-6888}:6888/udp"

  qbittorrent:
    image: "${YUNXIA_QBITTORRENT_IMAGE:-lscr.io/linuxserver/qbittorrent:latest}"
    container_name: yunxia-qbittorrent
    profiles:
      - bangumi
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      UMASK: "${UMASK:-022}"
      WEBUI_PORT: "8080"
    volumes:
      - qbittorrent-config:/config
      - backend-downloads:/downloads
    ports:
      - "${QBITTORRENT_WEBUI_PORT:-8081}:8080"
      - "${QBITTORRENT_BT_PORT:-6889}:6889"
      - "${QBITTORRENT_BT_PORT:-6889}:6889/udp"

  autobangumi:
    image: "${YUNXIA_AUTOBANGUMI_IMAGE:-ghcr.io/estrellaxd/auto_bangumi:latest}"
    container_name: yunxia-autobangumi
    profiles:
      - bangumi
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      UMASK: "${UMASK:-022}"
    volumes:
      - autobangumi-config:/app/config
      - autobangumi-data:/app/data
    ports:
      - "${AUTOBANGUMI_PORT:-7892}:7892"

volumes:
  backend-data:
  backend-downloads:
  aria2-config:
  qbittorrent-config:
  autobangumi-config:
  autobangumi-data:
